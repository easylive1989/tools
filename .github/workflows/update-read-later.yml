name: Update Read Later RSS

on:
  schedule:
    # 每天 00:00 UTC = 台灣時間 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-read-later
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run read-later sync
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_READ_LATER_CHANNEL_ID: ${{ secrets.DISCORD_READ_LATER_CHANNEL_ID }}
        run: python read_later/read_later.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- read_later/feed.xml read_later/state.json; then
            echo "No changes."
            exit 0
          fi
          git add read_later/feed.xml read_later/state.json
          git commit -m "chore(read_later): update feed"
          git push
