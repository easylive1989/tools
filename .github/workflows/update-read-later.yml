name: Update Read Later RSS

on:
  schedule:
    # 每兩小時執行一次
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Rebuild feed from scratch (delete state.json first)'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: update-read-later
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Reset state for full rebuild
        if: github.event_name == 'workflow_dispatch' && inputs.rebuild
        run: rm -f read_later/state.json

      - name: Run read-later sync
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python read_later/read_later.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- read_later/feed.xml read_later/state.json; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add read_later/feed.xml read_later/state.json
          git commit -m "chore(read_later): update feed"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref master
