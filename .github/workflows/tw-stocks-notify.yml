name: TW Stocks Price Notify

on:
  schedule:
    # 14:00 UTC+8 (收盤後) = 06:00 UTC，週一至週五
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Fetch TW stock prices and notify Discord
        env:
          DISCORD_STOCK_WEBHOOK_URL: ${{ secrets.DISCORD_STOCK_WEBHOOK_URL }}
        run: |
          python stock/stock_notify.py --list stock/tw_stock_list.txt
