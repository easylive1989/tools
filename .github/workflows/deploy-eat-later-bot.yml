name: Deploy Eat Later Bot

on:
  push:
    branches:
      - master
    paths:
      - 'eat_later/**'
      - 'common/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          rsync -av --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' \
            eat_later/ root@${{ secrets.VPS_HOST }}:/opt/eat_later/
          rsync -av --exclude='__pycache__' --exclude='*.pyc' \
            common/ root@${{ secrets.VPS_HOST }}:/opt/eat_later/common/

      - name: Install deps and restart service
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            cd /opt/eat_later
            python3 -m venv .venv
            .venv/bin/pip install -q -r requirements.txt

            if [ ! -f /etc/systemd/system/eat-later-bot.service ]; then
              cat > /etc/systemd/system/eat-later-bot.service << 'EOF'
          [Unit]
          Description=Eat Later Bot - Discord Restaurant Collector
          After=network.target

          [Service]
          EnvironmentFile=/opt/eat_later/.env
          WorkingDirectory=/opt/eat_later
          ExecStart=/opt/eat_later/.venv/bin/python bot.py
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF
              systemctl daemon-reload
              systemctl enable eat-later-bot
            fi

            systemctl restart eat-later-bot
            systemctl status eat-later-bot --no-pager
          "
