name: Update RSS Hub Feeds

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'rss_hub/sources.json'
      - 'rss_hub/rss_hub.py'
      - 'rss_hub/adapters/**'
      - '.github/workflows/update-rss-hub.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: update-rss-hub
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Install Playwright Chromium
        run: uvx --from playwright playwright install --with-deps chromium

      - name: Generate feeds
        run: uv run rss_hub/rss_hub.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # _debug/ is gitignored, so this only stages published feed files.
          git add rss_hub/output
          if git diff --cached --quiet -- rss_hub/output; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(rss_hub): update feeds"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload debug HTML on failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss-hub-debug
          path: rss_hub/output/_debug
          if-no-files-found: ignore
          retention-days: 7

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref master
