name: Update RSS Hub Feeds

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'rss_hub/sources.json'
      - 'rss_hub/rss_hub.py'
      - 'rss_hub/adapters/**'
      - '.github/workflows/update-rss-hub.yml'

permissions:
  contents: write
  actions: write

concurrency:
  group: update-rss-hub
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Generate feeds
        run: uv run rss_hub/rss_hub.py

      - name: Commit changes
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- rss_hub/output; then
            echo "No changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add rss_hub/output
          git commit -m "chore(rss_hub): update feeds"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref master
