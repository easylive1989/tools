name: Deploy Stock Dashboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'stock/dashboard/frontend/**'
      - 'travel/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build stock dashboard React app
        working-directory: stock/dashboard/frontend
        run: npm ci && npm run build

      - name: Build travel app
        working-directory: travel/2026_austria_czechia
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/stock
          mkdir -p _site/travel/2026_austria_czechia
          cp -r stock/dashboard/frontend/dist/. _site/stock/
          # SPA refresh fallback: GH Pages serves 404.html for unknown paths,
          # which boots the React app and lets react-router resolve the URL.
          cp _site/stock/index.html _site/stock/404.html
          # Keep legacy vanilla page available during FE-B/C migration.
          cp stock/dashboard/frontend/stock.html _site/stock/stock.html
          cp -r travel/2026_austria_czechia/dist/. _site/travel/2026_austria_czechia/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
