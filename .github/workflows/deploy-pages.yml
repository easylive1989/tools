name: Deploy Travel Pages to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'travel/**'
      - 'CNAME'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build travel app
        working-directory: travel/2026_austria_czechia
        run: npm ci && npm run build

      - name: Build travel editor
        working-directory: travel/editor
        run: npm ci && npm run build

      - name: Assemble site
        run: |
          mkdir -p _site/travel/2026_austria_czechia
          mkdir -p _site/travel/editor
          cp -r travel/2026_austria_czechia/dist/. _site/travel/2026_austria_czechia/
          cp -r travel/editor/dist/. _site/travel/editor/
          # Carry the custom domain so deploys don't drop it.
          cp CNAME _site/CNAME

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
