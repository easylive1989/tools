name: Deploy Static Pages to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'travel/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: travel/2026_austria_czechia/package-lock.json

      - name: Build 2026 Austria & Czechia travel guide
        working-directory: travel/2026_austria_czechia
        run: npm ci && npm run build

      - name: Assemble pages
        run: |
          mkdir -p _site/travel/2026_austria_czechia
          cp -r travel/2026_austria_czechia/dist/. _site/travel/2026_austria_czechia/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
