name: Deploy Stock Dashboard Backend

on:
  push:
    branches:
      - master
    paths:
      - 'stock/dashboard/backend/**'
      - 'stock/dashboard/stock-dashboard.service'
      - 'common/**'
      - '.github/workflows/deploy-stock-dashboard-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS
        run: |
          ssh root@${{ secrets.VPS_HOST }} "mkdir -p /opt/stock-dashboard/backend /opt/stock-dashboard/common"
          rsync -av --delete \
            --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='stock_dashboard.db' --exclude='.env' \
            stock/dashboard/backend/ root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/backend/
          rsync -av --delete \
            --exclude='__pycache__' --exclude='*.pyc' \
            common/ root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/common/
          rsync -av stock/dashboard/stock-dashboard.service \
            root@${{ secrets.VPS_HOST }}:/opt/stock-dashboard/stock-dashboard.service

      - name: Write env file
        run: |
          ssh root@${{ secrets.VPS_HOST }} "cat > /opt/stock-dashboard/backend/.env <<'EOF'
          DISCORD_STOCK_WEBHOOK_URL=${{ secrets.DISCORD_STOCK_WEBHOOK_URL }}
          EOF
          chmod 600 /opt/stock-dashboard/backend/.env"

      - name: Install deps and restart service
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            set -e
            cd /opt/stock-dashboard/backend
            python3 -m venv .venv
            .venv/bin/pip install -q -r requirements.txt
            cp /opt/stock-dashboard/stock-dashboard.service /etc/systemd/system/stock-dashboard.service
            systemctl daemon-reload
            systemctl enable stock-dashboard
            systemctl restart stock-dashboard
            systemctl status stock-dashboard --no-pager
          "
