<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市場總覽</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 20px; font-size: 14px; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.top-bar h1 { font-size: 18px; font-weight: 700; color: #fff; }
.update-time { font-size: 12px; color: #94a3b8; }
.range-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.range-label { font-size: 12px; color: #94a3b8; margin-right: 4px; }
.range-btn { background: transparent; border: 1px solid #2d3348; border-radius: 5px; color: #94a3b8; font-size: 13px; padding: 4px 14px; cursor: pointer; }
.range-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; font-weight: 600; }
.top-section { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 14px; align-items: start; }
.grid-indicators { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.news-card { display: flex; flex-direction: column; max-height: 100%; }
.news-card .news-list { overflow-y: auto; max-height: 700px; }
.card { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; padding: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-label { font-size: 13px; color: #cbd5e1; text-transform: uppercase; letter-spacing: .05em; }
.card-value { font-size: 34px; font-weight: 700; color: #fff; }
.card-sub { font-size: 13px; color: #94a3b8; margin-top: 8px; }
.refresh-btn { background: transparent; border: 1px solid #2d3348; border-radius: 5px; color: #94a3b8; font-size: 13px; padding: 3px 8px; cursor: pointer; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
.badge-up   { background: rgba(74,222,128,.15); color: #4ade80; }
.badge-down { background: rgba(248,113,113,.15); color: #f87171; }
.badge-neutral { background: rgba(251,191,36,.15); color: #fbbf24; }
.stat-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 12px; }
.up { color: #4ade80; } .down { color: #f87171; } .neutral { color: #fbbf24; }
.chart-wrap { position: relative; height: 100px; }
.gauge-track { height: 6px; border-radius: 4px; background: linear-gradient(to right, #f87171, #fbbf24 50%, #4ade80); position: relative; margin: 0 0 4px; }
.gauge-marker { position: absolute; top: -5px; width: 14px; height: 14px; border-radius: 50%; background: #fff; border: 2px solid #0f1117; transform: translateX(-50%); transition: left .3s; }
.gauge-labels { display: flex; justify-content: space-between; font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
.ndc-inner { display: grid; grid-template-columns: auto 1fr; gap: 20px; align-items: start; }
.ndc-lights { display: flex; gap: 6px; margin: 6px 0 4px; }
.light { width: 12px; height: 12px; border-radius: 50%; background: #2d3348; }
.light.on-blue   { background: #60a5fa; box-shadow: 0 0 6px #60a5fa; }
.light.on-yelblue{ background: #34d399; box-shadow: 0 0 6px #34d399; }
.light.on-green  { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
.light.on-yellred{ background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
.light.on-red    { background: #f87171; box-shadow: 0 0 6px #f87171; }
.stock-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
.stock-table th { font-size: 11px; color: #94a3b8; text-transform: uppercase; padding: 5px 8px; border-bottom: 1px solid #2d3348; text-align: left; }
.stock-table td { padding: 7px 8px; border-bottom: 1px solid #1a1f2e; font-size: 13px; }
.stock-table tr:last-child td { border-bottom: none; }
.ticker { font-weight: 600; color: #60a5fa; }
.ticker-link { background: none; border: none; padding: 0; font: inherit; color: #60a5fa; font-weight: 600; cursor: pointer; text-decoration: none; }
.ticker-link:hover { text-decoration: underline; }
.r { text-align: right; }
.add-row { display: flex; gap: 8px; margin-top: 12px; }
.add-input { flex: 1; background: #0f1117; border: 1px solid #2d3348; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; }
.add-input::placeholder { color: #94a3b8; }
.add-btn { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
.del-btn { background: transparent; border: 1px solid #2d3348; border-radius: 4px; padding: 3px 7px; font-size: 11px; color: #94a3b8; cursor: pointer; }
.alerts-card { margin-top: 14px; }
.alert-form { display: grid; grid-template-columns: 1.2fr 1.4fr 1.2fr 1fr 0.6fr 1fr auto; gap: 8px; margin-top: 12px; }
.alert-form select, .alert-form input { background: #0f1117; border: 1px solid #2d3348; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 13px; }
.alert-form input::placeholder { color: #94a3b8; }
.alert-form button { background: #3b82f6; color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 13px; cursor: pointer; }
.alert-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px 4px; border-bottom: 1px solid #1a1f2e; font-size: 13px; }
.alert-row:last-child { border-bottom: none; }
.alert-row .meta { color: #94a3b8; font-size: 11px; }
.alert-status { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 600; }
.alert-status.on { background: rgba(74,222,128,.15); color: #4ade80; }
.alert-status.off { background: rgba(148,163,184,.15); color: #94a3b8; }
.alert-actions { display: flex; gap: 6px; }
.alert-empty { padding: 12px 0; color: #94a3b8; font-size: 13px; text-align: center; }
@media (max-width: 600px) {
  .alert-form { grid-template-columns: 1fr 1fr; }
  .alert-form button { grid-column: 1 / -1; }
}
.section-title { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
/* ── 新聞 ── */
.news-list { list-style: none; margin-top: 10px; }
.news-item { padding: 10px 0; border-bottom: 1px solid #1a1f2e; display: flex; flex-direction: column; gap: 4px; }
.news-item:last-child { border-bottom: none; }
.news-title { font-size: 14px; color: #e2e8f0; text-decoration: none; line-height: 1.4; }
.news-title:hover { color: #60a5fa; }
.news-meta { font-size: 11px; color: #64748b; display: flex; gap: 10px; }

/* ── 防止 grid/flex 子項目溢出 ── */
body { overflow-x: hidden; }
.grid-indicators > * { min-width: 0; }
.card { overflow: hidden; }
.stat-row { flex-wrap: wrap; }
.card-value { word-break: break-all; }
.chart-wrap { min-width: 0; width: 100%; }

/* ── Tablet (≤ 900px) ── */
@media (max-width: 900px) {
  /* 上方分欄改成上下堆疊（指標在上，新聞在下）*/
  .top-section { grid-template-columns: 1fr; }
  .news-card .news-list { max-height: 400px; }
  /* NDC 在 tablet 也改單欄，避免兩欄太擠 */
  .ndc-inner { grid-template-columns: 1fr; gap: 10px; }
}

/* ── Mobile (≤ 600px) ── */
@media (max-width: 600px) {
  body { padding: 12px; font-size: 13px; }

  /* top bar 上下堆疊 */
  .top-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
  .top-bar h1 { font-size: 16px; }
  .update-time { font-size: 11px; }

  /* 時間區間按鈕換行 */
  .range-bar { flex-wrap: wrap; }
  .range-label { width: 100%; margin-bottom: 2px; }
  .range-btn { font-size: 12px; padding: 4px 10px; }

  /* 指標卡單欄 */
  .grid-indicators { grid-template-columns: 1fr; gap: 10px; }
  .news-card .news-list { max-height: 300px; }

  /* 卡片縮小 */
  .card { padding: 12px; }
  .card-value { font-size: 26px; }
  .card-label { font-size: 11px; }
  .card-sub { font-size: 11px; }
  .badge { font-size: 11px; padding: 2px 7px; }

  /* gauge 縮小 */
  .gauge-labels { font-size: 11px; }

  /* NDC 燈號文字縮小 */
  .ndc-lights { gap: 5px; }
  .light { width: 10px; height: 10px; }

  /* 圖表高度縮小 */
  .chart-wrap { height: 80px; }

  /* 股票表格橫向捲動 */
  .stock-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .stock-table { min-width: 460px; }
  .stock-table .col-name { display: none; }
}
</style>
</head>
<body>

<div class="range-bar">
  <span class="range-label">時間區間：</span>
  <button class="range-btn" data-range="1M">1 個月</button>
  <button class="range-btn active" data-range="3M">3 個月</button>
  <button class="range-btn" data-range="6M">6 個月</button>
  <button class="range-btn" data-range="1Y">1 年</button>
  <button class="range-btn" data-range="3Y">3 年</button>
  <span class="update-time" id="update-time" style="margin-left: auto;">載入中…</span>
</div>

<div class="top-section">

<div class="grid-indicators">

  <!-- 加權指數 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">加權指數</span>
      <button class="refresh-btn" onclick="refreshIndicator('taiex')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="taiex-value">—</div>
      <span class="badge" id="taiex-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-taiex"></canvas></div>
    <div class="card-sub" id="taiex-sub"></div>
  </div>

  <!-- 台股成交金額 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">台股成交金額</span>
      <button class="refresh-btn" onclick="refreshIndicator('tw_volume')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="tw_volume-value">—</div>
      <span class="badge" id="tw_volume-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-tw_volume"></canvas></div>
    <div class="card-sub" id="tw_volume-sub"></div>
  </div>

  <!-- 美股成交量 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">美股 S&P500 成交量</span>
      <button class="refresh-btn" onclick="refreshIndicator('us_volume')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="us_volume-value">—</div>
      <span class="badge" id="us_volume-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-us_volume"></canvas></div>
    <div class="card-sub" id="us_volume-sub"></div>
  </div>

  <!-- 恐懼與貪婪 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">恐懼與貪婪指數</span>
      <button class="refresh-btn" onclick="refreshIndicator('fear_greed')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="fg-value">—</div>
      <span class="badge" id="fg-badge"></span>
    </div>
    <div class="gauge-track"><div class="gauge-marker" id="fg-marker" style="left:50%"></div></div>
    <div class="gauge-labels"><span>恐懼</span><span>貪婪</span></div>
    <div class="chart-wrap"><canvas id="chart-fear_greed"></canvas></div>
    <div class="card-sub" id="fg-sub"></div>
  </div>

  <!-- 台股融資餘額 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">台股融資餘額</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="margin_balance-value">—</div>
      <span class="badge" id="margin_balance-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-margin_balance"></canvas></div>
    <div class="card-sub" id="margin_balance-sub"></div>
  </div>

  <!-- 台股融券餘額 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">台股融券餘額</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="short_balance-value">—</div>
      <span class="badge" id="short_balance-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-short_balance"></canvas></div>
    <div class="card-sub" id="short_balance-sub"></div>
  </div>

  <!-- 台股券資比 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">台股券資比</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="short_margin_ratio-value">—</div>
      <span class="badge" id="short_margin_ratio-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-short_margin_ratio"></canvas></div>
    <div class="card-sub" id="short_margin_ratio-sub"></div>
  </div>

  <!-- 外資淨買超 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">外資淨買超</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="total_foreign_net-value">—</div>
      <span class="badge" id="total_foreign_net-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-total_foreign_net"></canvas></div>
    <div class="card-sub" id="total_foreign_net-sub"></div>
  </div>

  <!-- 投信淨買超 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">投信淨買超</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="total_trust_net-value">—</div>
      <span class="badge" id="total_trust_net-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-total_trust_net"></canvas></div>
    <div class="card-sub" id="total_trust_net-sub"></div>
  </div>

  <!-- 自營商淨買超 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">自營商淨買超</span>
      <button class="refresh-btn" onclick="refreshIndicator('chip_total')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="total_dealer_net-value">—</div>
      <span class="badge" id="total_dealer_net-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-total_dealer_net"></canvas></div>
    <div class="card-sub" id="total_dealer_net-sub"></div>
  </div>

  <!-- 國發會景氣指標 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">國發會景氣指標</span>
      <button class="refresh-btn" onclick="refreshIndicator('ndc')">↻ 更新</button>
    </div>
    <div class="ndc-inner">
      <div>
        <div style="font-size:13px;color:#94a3b8;margin-bottom:4px">景氣燈號</div>
        <div class="stat-row" style="margin-bottom:6px">
          <div class="card-value" id="ndc-value">—</div>
          <span class="badge" id="ndc-badge"></span>
        </div>
        <div class="ndc-lights">
          <div class="light" id="ndc-l1"></div>
          <div class="light" id="ndc-l2"></div>
          <div class="light" id="ndc-l3"></div>
          <div class="light" id="ndc-l4"></div>
          <div class="light" id="ndc-l5"></div>
        </div>
        <div style="font-size:10px;color:#94a3b8;margin-top:2px">藍│黃藍│綠│黃紅│紅</div>
        <div class="card-sub" id="ndc-sub" style="margin-top:8px"></div>
      </div>
      <div>
        <div style="font-size:13px;color:#94a3b8;margin-bottom:4px">分數走勢</div>
        <div class="chart-wrap"><canvas id="chart-ndc"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 台幣兌美金 -->
  <div class="card">
    <div class="card-header">
      <span class="card-label">台幣兌美金</span>
      <button class="refresh-btn" onclick="refreshIndicator('fx')">↻ 更新</button>
    </div>
    <div class="stat-row">
      <div class="card-value" id="fx-value">—</div>
      <span class="badge" id="fx-badge"></span>
    </div>
    <div class="chart-wrap"><canvas id="chart-fx"></canvas></div>
    <div class="card-sub" id="fx-sub"></div>
  </div>

</div>
<!-- /grid-indicators -->

<!-- 最新新聞（右側）-->
<div class="card news-card">
  <div class="card-header">
    <span class="section-title">最新財經新聞</span>
    <span class="update-time" id="news-time"></span>
  </div>
  <ul class="news-list" id="news-list">
    <li class="news-item"><span class="news-meta">載入中…</span></li>
  </ul>
</div>

</div>
<!-- /top-section -->

<!-- 自選股 -->
<div class="card">
  <div class="section-title">自選股票 / ETF / 虛擬幣</div>
  <div class="stock-table-wrap">
    <table class="stock-table">
      <thead><tr>
        <th>代號</th><th class="col-name">名稱</th>
        <th class="r">價格</th><th class="r">漲跌</th><th class="r">漲跌幅</th><th></th>
      </tr></thead>
      <tbody id="stock-tbody"></tbody>
    </table>
  </div>
  <div class="add-row">
    <input class="add-input" id="add-ticker-input" placeholder="輸入代號，例如 2317.TW、AAPL、ETH-USD…">
    <button class="add-btn" onclick="addStock()">+ 新增</button>
  </div>
</div>

<!-- 價格警示 -->
<div class="card alerts-card">
  <div class="section-title">價格警示</div>
  <div style="font-size:12px;color:#94a3b8;margin-top:4px">當指標或股價達到門檻時，將推送到 Discord。觸發後自動停用，可手動重新啟用。</div>
  <div id="alert-list"></div>
  <div class="alert-form">
    <select id="alert-target-type">
      <option value="indicator">指標</option>
      <option value="stock">股票 / ETF</option>
      <option value="stock_indicator">個股指標</option>
    </select>
    <select id="alert-target"></select>
    <select id="alert-indicator-key" style="display:none">
      <option value="per">PER</option>
      <option value="pbr">PBR</option>
      <option value="dividend_yield">殖利率</option>
      <option value="foreign_net">外資淨買</option>
      <option value="trust_net">投信淨買</option>
      <option value="dealer_net">自營淨買</option>
      <option value="margin_balance">融資餘額</option>
      <option value="short_balance">融券餘額</option>
    </select>
    <select id="alert-condition">
      <option value="above">大於等於</option>
      <option value="below">小於等於</option>
      <option value="streak_above">連 N 日突破</option>
      <option value="streak_below">連 N 日跌破</option>
    </select>
    <input id="alert-window-n" type="number" min="2" max="30" placeholder="N 日" value="5" style="display:none">
    <input id="alert-threshold" type="number" step="any" placeholder="門檻數值">
    <button onclick="addAlert()">+ 新增警示</button>
  </div>
</div>

<script>
const API_BASE = 'https://api.paul-learning.dev';
let currentRange = '3M';
const charts = {};

const CHART_DEFAULTS = {
  type: 'line',
  options: {
    responsive: true, maintainAspectRatio: false, animation: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1f2e', borderColor: '#3b82f6', borderWidth: 1,
        titleColor: '#94a3b8', bodyColor: '#e2e8f0',
        callbacks: { title: items => items[0].label }
      }
    },
    scales: {
      x: { grid: { color: '#2d3348' }, ticks: { color: '#94a3b8', maxTicksLimit: 4 } },
      y: { grid: { color: '#2d3348' }, ticks: { color: '#94a3b8' } }
    }
  }
};

function makeChart(id, color, yLabel) {
  const ctx = document.getElementById('chart-' + id).getContext('2d');
  charts[id] = new Chart(ctx, {
    ...JSON.parse(JSON.stringify(CHART_DEFAULTS)),
    data: {
      labels: [],
      datasets: [{
        data: [], borderColor: color,
        backgroundColor: color + '20', fill: true,
        tension: 0.3, pointRadius: 0, pointHoverRadius: 5,
        borderWidth: 2,
      }]
    }
  });
  charts[id].options.scales.y.title = { display: true, text: yLabel, color: '#94a3b8' };
  charts[id].options.scales.x.title = { display: true, text: '日期', color: '#94a3b8' };
  return charts[id];
}

function updateChart(id, rows) {
  const c = charts[id];
  if (!c) return;
  c.data.labels = rows.map(r => r.timestamp.slice(0, 10));
  c.data.datasets[0].data = rows.map(r => r.value);
  c.update('none');
}

function setBadge(el, changePct) {
  if (changePct == null) { el.textContent = ''; return; }
  const up = changePct >= 0;
  el.textContent = (up ? '▲ +' : '▼ ') + changePct.toFixed(2) + '%';
  el.className = 'badge ' + (up ? 'badge-up' : 'badge-down');
}

function fmtDate(iso) {
  return iso ? iso.slice(0, 10) : '';
}

async function loadDashboard() {
  const data = await fetch(API_BASE + '/api/dashboard').then(r => r.json());

  if (data.taiex) {
    document.getElementById('taiex-value').textContent = data.taiex.value.toLocaleString();
    setBadge(document.getElementById('taiex-badge'), data.taiex.extra?.change_pct);
    document.getElementById('taiex-sub').textContent =
      '前收 ' + (data.taiex.extra?.prev_close?.toLocaleString() ?? '—') +
      ' · 更新 ' + fmtDate(data.taiex.timestamp);
  }

  if (data.fear_greed) {
    const v = data.fear_greed.value;
    document.getElementById('fg-value').textContent = v;
    document.getElementById('fg-value').className = 'card-value ' + fgClass(v);
    const badge = document.getElementById('fg-badge');
    badge.textContent = data.fear_greed.extra?.label ?? '';
    badge.className = 'badge badge-neutral';
    document.getElementById('fg-marker').style.left = v + '%';
    document.getElementById('fg-sub').textContent = '更新 ' + fmtDate(data.fear_greed.timestamp);
  }

  if (data.margin_balance) {
    document.getElementById('margin_balance-value').textContent = data.margin_balance.value.toFixed(0) + ' 億';
    document.getElementById('margin_balance-sub').textContent = '更新 ' + fmtDate(data.margin_balance.timestamp);
  }
  if (data.short_balance) {
    // 千張更易讀
    document.getElementById('short_balance-value').textContent = (data.short_balance.value / 1000).toFixed(0) + ' 千張';
    document.getElementById('short_balance-sub').textContent = '更新 ' + fmtDate(data.short_balance.timestamp);
  }
  if (data.short_margin_ratio) {
    document.getElementById('short_margin_ratio-value').textContent = data.short_margin_ratio.value.toFixed(2) + ' %';
    document.getElementById('short_margin_ratio-sub').textContent = '更新 ' + fmtDate(data.short_margin_ratio.timestamp);
  }

  for (const k of ['total_foreign_net', 'total_trust_net', 'total_dealer_net']) {
    if (data[k]) {
      const v = data[k].value;
      const el = document.getElementById(k + '-value');
      el.textContent = (v >= 0 ? '+' : '') + v.toFixed(2) + ' 億';
      el.className = 'card-value ' + (v >= 0 ? 'up' : 'down');
      document.getElementById(k + '-sub').textContent = '更新 ' + fmtDate(data[k].timestamp);
    }
  }

  if (data.ndc) {
    const score = data.ndc.value;
    const light = data.ndc.extra?.light ?? '';
    const code  = data.ndc.extra?.light_code ?? 0;
    document.getElementById('ndc-value').textContent = score + ' 分';
    const b = document.getElementById('ndc-badge');
    b.textContent = light;
    b.className = 'badge badge-neutral';
    ['on-blue','on-yelblue','on-green','on-yellred','on-red'].forEach((cls, i) => {
      const el = document.getElementById('ndc-l' + (i+1));
      el.className = 'light' + (code === i+1 ? ' ' + cls : '');
    });
    document.getElementById('ndc-sub').textContent =
      (data.ndc.extra?.period ?? '') + ' · 每月更新';
  }

  if (data.fx) {
    document.getElementById('fx-value').textContent = data.fx.value.toFixed(2);
    setBadge(document.getElementById('fx-badge'), data.fx.extra?.change_pct);
    document.getElementById('fx-sub').textContent =
      '前收 ' + (data.fx.extra?.prev_close ?? '—') +
      ' · 更新 ' + fmtDate(data.fx.timestamp);
  }

  if (data.tw_volume) {
    document.getElementById('tw_volume-value').textContent = data.tw_volume.value.toLocaleString() + ' 億';
    setBadge(document.getElementById('tw_volume-badge'), data.tw_volume.extra?.change_pct);
    document.getElementById('tw_volume-sub').textContent =
      '前日 ' + (data.tw_volume.extra?.prev_value?.toLocaleString() ?? '—') + ' 億 · 更新 ' + fmtDate(data.tw_volume.timestamp);
  }

  if (data.us_volume) {
    document.getElementById('us_volume-value').textContent = data.us_volume.value.toLocaleString() + ' 億股';
    setBadge(document.getElementById('us_volume-badge'), data.us_volume.extra?.change_pct);
    document.getElementById('us_volume-sub').textContent =
      '前日 ' + (data.us_volume.extra?.prev_value?.toLocaleString() ?? '—') + ' 億股 · 更新 ' + fmtDate(data.us_volume.timestamp);
  }

  document.getElementById('update-time').textContent =
    '上次更新：' + new Date().toLocaleTimeString('zh-TW');
}

function fgClass(v) {
  if (v < 45) return 'down';
  if (v > 55) return 'up';
  return 'neutral';
}

async function loadHistories() {
  const indicators = ['taiex', 'tw_volume', 'us_volume', 'fear_greed',
                      'margin_balance', 'short_balance', 'short_margin_ratio',
                      'total_foreign_net', 'total_trust_net', 'total_dealer_net',
                      'ndc', 'fx'];
  const units  = { taiex: '點', fear_greed: '指數', ndc: '分', fx: 'TWD',
                   tw_volume: '億元', us_volume: '億股',
                   margin_balance: '億元', short_balance: '張', short_margin_ratio: '%',
                   total_foreign_net: '億元', total_trust_net: '億元', total_dealer_net: '億元' };
  const colors = { taiex: '#4ade80', fear_greed: '#fbbf24', ndc: '#fbbf24', fx: '#a78bfa',
                   tw_volume: '#f97316', us_volume: '#ec4899',
                   margin_balance: '#60a5fa', short_balance: '#fb923c', short_margin_ratio: '#a3a3a3',
                   total_foreign_net: '#22d3ee', total_trust_net: '#a78bfa', total_dealer_net: '#facc15' };

  for (const ind of indicators) {
    if (!charts[ind]) makeChart(ind, colors[ind], units[ind]);
    const rows = await fetch(API_BASE + '/api/history/' + ind + '?time_range=' + currentRange).then(r => r.json());
    updateChart(ind, rows);
  }
}

async function loadStocks() {
  const stocks = await fetch(API_BASE + '/api/stocks').then(r => r.json());
  const tbody = document.getElementById('stock-tbody');
  tbody.innerHTML = '';
  for (const s of stocks) {
    const up = (s.change_pct ?? 0) >= 0;
    const cls = up ? 'up' : 'down';
    const arrow = up ? '▲' : '▼';
    const detailUrl = 'stock.html?ticker=' + encodeURIComponent(s.ticker);
    tbody.insertAdjacentHTML('beforeend', `
      <tr>
        <td><a class="ticker-link" href="${detailUrl}">${s.ticker}</a></td>
        <td class="col-name">${s.name ?? ''}</td>
        <td class="r">${s.price != null ? s.price.toLocaleString() + ' ' + (s.currency ?? '') : '—'}</td>
        <td class="r ${cls}">${s.change != null ? arrow + ' ' + Math.abs(s.change).toFixed(2) : '—'}</td>
        <td class="r ${cls}">${s.change_pct != null ? (up?'+':'') + s.change_pct.toFixed(2) + '%' : '—'}</td>
        <td><button class="del-btn" onclick="deleteStock('${s.ticker}')">✕</button></td>
      </tr>`);
  }
}

async function addStock() {
  const input = document.getElementById('add-ticker-input');
  const ticker = input.value.trim();
  if (!ticker) return;
  await fetch(API_BASE + '/api/stocks', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ticker }),
  });
  input.value = '';
  loadStocks();
}

async function deleteStock(ticker) {
  await fetch(API_BASE + '/api/stocks/' + encodeURIComponent(ticker), { method: 'DELETE' });
  loadStocks();
}

async function refreshIndicator(indicator) {
  await fetch(API_BASE + '/api/refresh/' + indicator, { method: 'POST' });
  loadDashboard();
  loadHistories();
}

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    loadHistories();
  });
});

document.getElementById('add-ticker-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStock();
});

const INDICATOR_LABELS = {
  taiex:               '加權指數',
  fx:                  '台幣兌美金',
  fear_greed:          '恐懼與貪婪指數',
  margin_balance:      '台股融資餘額',
  short_balance:       '台股融券餘額',
  short_margin_ratio:  '台股券資比',
  total_foreign_net:   '外資淨買超',
  total_trust_net:     '投信淨買超',
  total_dealer_net:    '自營商淨買超',
  ndc:                 '國發會景氣指標',
};

const STOCK_INDICATOR_LABELS = {
  per:              'PER',
  pbr:              'PBR',
  dividend_yield:   '殖利率',
  foreign_net:      '外資淨買',
  trust_net:        '投信淨買',
  dealer_net:       '自營淨買',
  margin_balance:   '融資餘額',
  short_balance:    '融券餘額',
};

function alertTargetLabel(a) {
  if (a.target_type === 'indicator') return INDICATOR_LABELS[a.target] || a.target;
  if (a.target_type === 'stock_indicator') {
    const ikLabel = STOCK_INDICATOR_LABELS[a.indicator_key] || a.indicator_key || '';
    return `${a.target} ${ikLabel}`;
  }
  return a.target;   // stock
}

function alertConditionLabel(a) {
  if (a.condition === 'above') return '≥';
  if (a.condition === 'below') return '≤';
  if (a.condition === 'streak_above') return `連 ${a.window_n} 日 ≥`;
  if (a.condition === 'streak_below') return `連 ${a.window_n} 日 ≤`;
  return a.condition;
}

function fmtAlertValue(v) {
  if (v == null) return '';
  return Number(v).toLocaleString(undefined, { maximumFractionDigits: 4 });
}

async function refreshTargetOptions() {
  const type = document.getElementById('alert-target-type').value;
  const targetSelect = document.getElementById('alert-target');
  const indKeyEl = document.getElementById('alert-indicator-key');
  targetSelect.innerHTML = '';

  // indicator_key 只在 stock_indicator 時顯示
  indKeyEl.style.display = (type === 'stock_indicator') ? '' : 'none';

  if (type === 'indicator') {
    Object.entries(INDICATOR_LABELS).forEach(([k, label]) => {
      const opt = document.createElement('option');
      opt.value = k;
      opt.textContent = label;
      targetSelect.appendChild(opt);
    });
    return;
  }

  // stock 與 stock_indicator 都列 watchlist 中的 ticker
  const stocks = await fetch(API_BASE + '/api/stocks').then(r => r.json()).catch(() => []);
  if (!stocks.length) {
    const opt = document.createElement('option');
    opt.value = '';
    opt.textContent = '（請先在自選股新增）';
    targetSelect.appendChild(opt);
    return;
  }
  for (const s of stocks) {
    const opt = document.createElement('option');
    opt.value = s.ticker;
    opt.textContent = s.name ? `${s.ticker} · ${s.name}` : s.ticker;
    targetSelect.appendChild(opt);
  }
}

function refreshConditionFields() {
  const cond = document.getElementById('alert-condition').value;
  const windowEl = document.getElementById('alert-window-n');
  windowEl.style.display = cond.startsWith('streak_') ? '' : 'none';
}

async function loadAlerts() {
  const alerts = await fetch(API_BASE + '/api/alerts').then(r => r.json()).catch(() => []);
  const list = document.getElementById('alert-list');
  if (!alerts.length) {
    list.innerHTML = '<div class="alert-empty">尚未設定任何警示</div>';
    return;
  }
  list.innerHTML = alerts.map(a => {
    const condText = alertConditionLabel(a);
    const enabled = a.enabled === 1 || a.enabled === true;
    const statusClass = enabled ? 'on' : 'off';
    const statusText = enabled ? '監控中' : '已停用';
    let metaText = `建立於 ${a.created_at?.slice(0,10) ?? ''}`;
    if (a.triggered_at) {
      metaText += ` · 已於 ${a.triggered_at.slice(0,10)} 觸發 (${fmtAlertValue(a.triggered_value)})`;
    }
    return `
      <div class="alert-row">
        <div>
          <div><strong>${alertTargetLabel(a)}</strong> ${condText} <strong>${fmtAlertValue(a.threshold)}</strong>
            <span class="alert-status ${statusClass}">${statusText}</span>
          </div>
          <div class="meta">${metaText}</div>
        </div>
        <div class="alert-actions">
          <button class="del-btn" onclick="toggleAlert(${a.id}, ${!enabled})">${enabled ? '停用' : '啟用'}</button>
          <button class="del-btn" onclick="deleteAlert(${a.id})">✕</button>
        </div>
      </div>`;
  }).join('');
}

async function addAlert() {
  const target_type = document.getElementById('alert-target-type').value;
  const target = document.getElementById('alert-target').value;
  const condition = document.getElementById('alert-condition').value;
  const thresholdRaw = document.getElementById('alert-threshold').value;
  if (!target || thresholdRaw === '') {
    alert('請選擇目標並輸入門檻數值');
    return;
  }
  const payload = { target_type, target, condition, threshold: Number(thresholdRaw) };

  if (target_type === 'stock_indicator') {
    payload.indicator_key = document.getElementById('alert-indicator-key').value;
  }
  if (condition.startsWith('streak_')) {
    const wn = document.getElementById('alert-window-n').value;
    if (wn === '') {
      alert('streak 警示需輸入 N 日');
      return;
    }
    payload.window_n = Number(wn);
  }

  const r = await fetch(API_BASE + '/api/alerts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    alert('建立失敗:' + (err.detail || r.status));
    return;
  }
  document.getElementById('alert-threshold').value = '';
  loadAlerts();
}

async function deleteAlert(id) {
  await fetch(API_BASE + '/api/alerts/' + id, { method: 'DELETE' });
  loadAlerts();
}

async function toggleAlert(id, enabled) {
  await fetch(API_BASE + '/api/alerts/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ enabled }),
  });
  loadAlerts();
}

document.getElementById('alert-target-type').addEventListener('change', refreshTargetOptions);
document.getElementById('alert-condition').addEventListener('change', refreshConditionFields);

async function loadNews() {
  const items = await fetch(API_BASE + '/api/news?limit=15').then(r => r.json()).catch(() => []);
  const list = document.getElementById('news-list');
  if (!items.length) { list.innerHTML = '<li class="news-item"><span class="news-meta">暫無新聞</span></li>'; return; }
  list.innerHTML = items.map(n => {
    const ts = n.published ? new Date(n.published) : null;
    const timeStr = ts ? ts.toLocaleString('zh-TW', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';
    return `<li class="news-item">
      <a class="news-title" href="${n.url}" target="_blank" rel="noopener">${n.title}</a>
      <span class="news-meta"><span>${n.source}</span><span>${timeStr}</span></span>
    </li>`;
  }).join('');
  document.getElementById('news-time').textContent = '更新：' + new Date().toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
}

(async () => {
  await loadDashboard();
  await loadHistories();
  await loadStocks();
  await refreshTargetOptions();
  refreshConditionFields();
  await loadAlerts();
  await loadNews();
  setInterval(async () => {
    await loadDashboard();
    await loadStocks();
    await loadAlerts();
  }, 60_000);
  setInterval(loadNews, 30 * 60_000);
})();
</script>
