<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個股技術分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; padding: 20px; font-size: 14px; }
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }
.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
.back-link { font-size: 13px; color: #94a3b8; }
.back-link:hover { color: #60a5fa; }
.title-block h1 { font-size: 20px; font-weight: 700; color: #fff; }
.title-block .sub { font-size: 13px; color: #94a3b8; margin-top: 2px; }
.range-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
.range-label { font-size: 12px; color: #94a3b8; margin-right: 4px; }
.range-btn { background: transparent; border: 1px solid #2d3348; border-radius: 5px; color: #94a3b8; font-size: 13px; padding: 4px 14px; cursor: pointer; }
.range-btn.active { background: #3b82f6; border-color: #3b82f6; color: #fff; font-weight: 600; }
.card { background: #1e2130; border: 1px solid #2d3348; border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-label { font-size: 13px; color: #cbd5e1; text-transform: uppercase; letter-spacing: .05em; }
.card-hint { font-size: 11px; color: #94a3b8; }
.card-sub { font-size: 13px; color: #94a3b8; }
.chart-wrap { position: relative; height: 320px; }
.chart-wrap.short { height: 180px; }
.stat-row { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
.price { font-size: 32px; font-weight: 700; color: #fff; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 13px; font-weight: 600; }
.badge-up   { background: rgba(74,222,128,.15); color: #4ade80; }
.badge-down { background: rgba(248,113,113,.15); color: #f87171; }
.up { color: #4ade80; } .down { color: #f87171; }
.status { color: #94a3b8; font-size: 13px; padding: 16px 0; }
.broker-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.broker-table th, .broker-table td { padding: 8px 6px; text-align: right; border-bottom: 1px solid #2d3348; }
.broker-table th { color: #94a3b8; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.broker-table td.broker-name, .broker-table th.broker-name { text-align: left; color: #e2e8f0; }
.broker-table tbody tr:last-child td { border-bottom: none; }
.broker-table .streak { display: inline-block; padding: 2px 8px; border-radius: 999px; background: rgba(74,222,128,.12); color: #4ade80; font-weight: 600; font-size: 12px; }
.broker-empty { color: #94a3b8; font-size: 13px; padding: 8px 0; }
.chip-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.chip-table th, .chip-table td { padding: 8px 6px; text-align: right; border-bottom: 1px solid #2d3348; }
.chip-table th { color: #94a3b8; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.chip-table td.chip-date, .chip-table th.chip-date { text-align: left; color: #e2e8f0; }
.chip-table tbody tr:last-child td { border-bottom: none; }
.chip-empty { color: #94a3b8; font-size: 13px; padding: 8px 0; }
.chip-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 720px) { .chip-grid { grid-template-columns: 1fr; } }
.chip-pos { color: #4ade80; }
.chip-neg { color: #f87171; }
.fund-stat-row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 12px; }
.fund-stat { display: flex; flex-direction: column; gap: 2px; min-width: 110px; }
.fund-stat .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: .04em; }
.fund-stat .value { font-size: 18px; font-weight: 600; color: #e2e8f0; }
.fund-stat .sub   { font-size: 11px; color: #94a3b8; }
.fund-empty { color: #94a3b8; font-size: 13px; padding: 8px 0; }
.fund-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.fund-table th, .fund-table td { padding: 6px 8px; text-align: right; border-bottom: 1px solid #2d3348; }
.fund-table th { color: #94a3b8; font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
.fund-table td.fund-label, .fund-table th.fund-label { text-align: left; color: #e2e8f0; }
.fund-table tbody tr:last-child td { border-bottom: none; }
.fund-pos { color: #4ade80; }
.fund-neg { color: #f87171; }
@media (max-width: 600px) {
  body { padding: 12px; }
  .price { font-size: 24px; }
  .chart-wrap { height: 240px; }
  .chart-wrap.short { height: 150px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <div>
    <a class="back-link" href="index.html">← 返回市場總覽</a>
    <div class="title-block" style="margin-top:6px">
      <h1 id="page-title">載入中…</h1>
      <div class="sub" id="page-sub"></div>
    </div>
  </div>
  <div class="stat-row" id="price-block"></div>
</div>

<div class="range-bar">
  <span class="range-label">時間區間：</span>
  <button class="range-btn" data-range="1M">1 個月</button>
  <button class="range-btn active" data-range="3M">3 個月</button>
  <button class="range-btn" data-range="6M">6 個月</button>
  <button class="range-btn" data-range="1Y">1 年</button>
  <button class="range-btn" data-range="3Y">3 年</button>
</div>

<div id="status" class="status">載入中…</div>

<div id="charts" style="display:none">
  <div class="card">
    <div class="card-header">
      <span class="card-label">日 K 棒</span>
      <span class="card-hint">綠漲紅跌（開高低收）</span>
    </div>
    <div class="chart-wrap"><canvas id="chart-candlestick"></canvas></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">收盤價 + 移動平均</span>
      <span class="card-hint">MA5 / MA20 / MA60</span>
    </div>
    <div class="chart-wrap"><canvas id="chart-price"></canvas></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">成交量</span>
      <span class="card-hint">紅綠依當日漲跌</span>
    </div>
    <div class="chart-wrap short"><canvas id="chart-volume"></canvas></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">RSI (14)</span>
      <span class="card-hint">70 以上偏買超 / 30 以下偏賣超</span>
    </div>
    <div class="chart-wrap short"><canvas id="chart-rsi"></canvas></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">MACD (12, 26, 9)</span>
      <span class="card-hint">柱狀為 MACD − Signal</span>
    </div>
    <div class="chart-wrap short"><canvas id="chart-macd"></canvas></div>
  </div>

  <div class="card" id="broker-card" style="display:none">
    <div class="card-header">
      <span class="card-label">前五大買超券商</span>
      <span class="card-hint" id="broker-hint">近 20 個交易日</span>
    </div>
    <div id="broker-body"></div>
  </div>

  <div class="card" id="chip-card" style="display:none">
    <div class="card-header">
      <span class="card-label">籌碼面</span>
      <span class="card-hint" id="chip-hint">近 20 個交易日</span>
    </div>
    <div class="chip-grid">
      <div>
        <div class="card-sub" style="margin-bottom:6px;">三大法人(張)</div>
        <div id="chip-inst-body"></div>
      </div>
      <div>
        <div class="card-sub" style="margin-bottom:6px;">融資融券(張)</div>
        <div id="chip-margin-body"></div>
      </div>
    </div>
  </div>

  <div class="card" id="valuation-card" style="display:none">
    <div class="card-header">
      <span class="card-label">估值快照</span>
      <span class="card-hint" id="valuation-hint">PER / PBR / 殖利率 · 近 5 年</span>
    </div>
    <div id="valuation-stats" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-valuation"></canvas></div>
  </div>

  <div class="card" id="revenue-card" style="display:none">
    <div class="card-header">
      <span class="card-label">月營收</span>
      <span class="card-hint" id="revenue-hint">近 36 個月</span>
    </div>
    <div id="revenue-stats" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-revenue"></canvas></div>
  </div>

  <div class="card" id="income-card" style="display:none">
    <div class="card-header">
      <span class="card-label">損益表</span>
      <span class="card-hint" id="income-hint">近 12 季</span>
    </div>
    <div id="income-summary" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-eps"></canvas></div>
    <div id="income-table-wrap" style="margin-top:12px; overflow-x:auto"></div>
  </div>

  <div class="card" id="balance-card" style="display:none">
    <div class="card-header">
      <span class="card-label">資產負債表</span>
      <span class="card-hint" id="balance-hint">近 12 季</span>
    </div>
    <div id="balance-summary" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-balance"></canvas></div>
    <div id="balance-table-wrap" style="margin-top:12px; overflow-x:auto"></div>
  </div>

  <div class="card" id="cashflow-card" style="display:none">
    <div class="card-header">
      <span class="card-label">現金流量表</span>
      <span class="card-hint" id="cashflow-hint">近 12 季</span>
    </div>
    <div id="cashflow-summary" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-cashflow"></canvas></div>
    <div id="cashflow-table-wrap" style="margin-top:12px; overflow-x:auto"></div>
  </div>

  <div class="card" id="dividend-card" style="display:none">
    <div class="card-header">
      <span class="card-label">股利歷史</span>
      <span class="card-hint" id="dividend-hint">近 10 年</span>
    </div>
    <div id="dividend-summary" class="fund-stat-row"></div>
    <div class="chart-wrap short"><canvas id="chart-dividend"></canvas></div>
    <div id="dividend-table-wrap" style="margin-top:12px; overflow-x:auto"></div>
  </div>
</div>

<script>
const API_BASE = 'https://api.paul-learning.dev';

async function apiFetch(path, opts = {}) {
  let token = localStorage.getItem('sd_token');
  if (!token) {
    token = prompt('輸入 API token (sd_...):');
    if (!token) throw new Error('No token provided');
    localStorage.setItem('sd_token', token);
  }
  const res = await fetch(API_BASE + path, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      'Authorization': `Bearer ${token}`,
    },
  });
  if (res.status === 401) {
    localStorage.removeItem('sd_token');
    alert('Token 無效或過期，請重新整理頁面並輸入新 token');
    throw new Error('Unauthorized');
  }
  return res;
}

const params = new URLSearchParams(location.search);
const TICKER = (params.get('ticker') || '').toUpperCase();
let currentRange = '3M';
const charts = {};

if (!TICKER) {
  document.getElementById('status').textContent = '缺少 ticker 參數。';
  document.title = '個股技術分析';
} else {
  document.title = TICKER + ' 技術分析';
}

const COMMON_OPTS = {
  responsive: true,
  maintainAspectRatio: false,
  animation: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { labels: { color: '#cbd5e1', boxWidth: 12 } },
    tooltip: {
      backgroundColor: '#1a1f2e', borderColor: '#3b82f6', borderWidth: 1,
      titleColor: '#94a3b8', bodyColor: '#e2e8f0',
    },
  },
  scales: {
    x: { grid: { color: '#2d3348' }, ticks: { color: '#94a3b8', maxTicksLimit: 8 } },
    y: { grid: { color: '#2d3348' }, ticks: { color: '#94a3b8' } },
  },
};

function destroyCharts() {
  for (const key of Object.keys(charts)) {
    charts[key].destroy();
    delete charts[key];
  }
}

function makeCandlestickChart(labels, candles) {
  const ctx = document.getElementById('chart-candlestick').getContext('2d');
  const valid = candles.filter(c => c.high != null && c.low != null);
  const minLow = valid.length ? Math.min(...valid.map(c => c.low)) : 0;
  const maxHigh = valid.length ? Math.max(...valid.map(c => c.high)) : 1;
  const pad = (maxHigh - minLow) * 0.05 || maxHigh * 0.01;

  const candlestickDraw = {
    id: 'candlestickDraw',
    afterDatasetsDraw(chart) {
      const { ctx, scales: { y } } = chart;
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      candles.forEach((c, i) => {
        if (c.open == null || c.close == null || c.high == null || c.low == null) return;
        const bar = meta.data[i];
        if (!bar) return;
        const xPos = bar.x;
        const barWidth = bar.width || 6;
        const bodyWidth = Math.max(2, barWidth * 0.8);
        const up = c.close >= c.open;
        const color = up ? '#4ade80' : '#f87171';
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(xPos, y.getPixelForValue(c.high));
        ctx.lineTo(xPos, y.getPixelForValue(c.low));
        ctx.stroke();
        const bodyTop = y.getPixelForValue(Math.max(c.open, c.close));
        const bodyBottom = y.getPixelForValue(Math.min(c.open, c.close));
        const bodyHeight = Math.max(1, bodyBottom - bodyTop);
        ctx.fillRect(xPos - bodyWidth / 2, bodyTop, bodyWidth, bodyHeight);
      });
      ctx.restore();
    },
  };

  charts.candlestick = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'K 棒',
        data: candles.map(c => (c.high != null && c.low != null) ? [c.low, c.high] : null),
        backgroundColor: 'transparent',
        borderColor: 'transparent',
        barPercentage: 0.9,
        categoryPercentage: 0.9,
      }],
    },
    options: {
      ...COMMON_OPTS,
      scales: {
        ...COMMON_OPTS.scales,
        y: { ...COMMON_OPTS.scales.y, min: minLow - pad, max: maxHigh + pad },
      },
      plugins: {
        ...COMMON_OPTS.plugins,
        legend: { display: false },
        tooltip: {
          ...COMMON_OPTS.plugins.tooltip,
          callbacks: {
            label: (item) => {
              const c = candles[item.dataIndex];
              if (!c) return '';
              const fmt = v => v == null ? '—' : v.toLocaleString(undefined, { maximumFractionDigits: 4 });
              return [`開 ${fmt(c.open)}`, `高 ${fmt(c.high)}`, `低 ${fmt(c.low)}`, `收 ${fmt(c.close)}`];
            },
          },
        },
      },
    },
    plugins: [candlestickDraw],
  });
}

function makePriceChart(labels, candles, indicators) {
  const ctx = document.getElementById('chart-price').getContext('2d');
  const closes = candles.map(c => c.close);
  charts.price = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '收盤', data: closes, borderColor: '#60a5fa', backgroundColor: 'rgba(96,165,250,.15)', fill: true, tension: 0.2, pointRadius: 0, borderWidth: 2 },
        { label: 'MA5',  data: indicators.ma5,  borderColor: '#fbbf24', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2 },
        { label: 'MA20', data: indicators.ma20, borderColor: '#a78bfa', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2 },
        { label: 'MA60', data: indicators.ma60, borderColor: '#f472b6', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2 },
      ],
    },
    options: COMMON_OPTS,
  });
}

function makeVolumeChart(labels, candles) {
  const ctx = document.getElementById('chart-volume').getContext('2d');
  const colors = candles.map((c, i) => {
    const prev = i > 0 ? candles[i - 1].close : c.close;
    return c.close >= prev ? 'rgba(74,222,128,.7)' : 'rgba(248,113,113,.7)';
  });
  charts.volume = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: '成交量', data: candles.map(c => c.volume), backgroundColor: colors, borderWidth: 0 }],
    },
    options: { ...COMMON_OPTS, plugins: { ...COMMON_OPTS.plugins, legend: { display: false } } },
  });
}

function makeRsiChart(labels, indicators) {
  const ctx = document.getElementById('chart-rsi').getContext('2d');
  const rsi = indicators.rsi14;
  charts.rsi = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'RSI 14', data: rsi, borderColor: '#fbbf24', borderWidth: 1.8, pointRadius: 0, fill: false, tension: 0.2 },
        { label: '70',     data: rsi.map(() => 70), borderColor: 'rgba(248,113,113,.5)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false },
        { label: '30',     data: rsi.map(() => 30), borderColor: 'rgba(74,222,128,.5)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false },
      ],
    },
    options: { ...COMMON_OPTS, scales: { ...COMMON_OPTS.scales, y: { ...COMMON_OPTS.scales.y, min: 0, max: 100 } } },
  });
}

function makeMacdChart(labels, indicators) {
  const ctx = document.getElementById('chart-macd').getContext('2d');
  const hist = indicators.macd_histogram;
  const histColors = hist.map(v => v == null ? 'rgba(148,163,184,.4)' : (v >= 0 ? 'rgba(74,222,128,.6)' : 'rgba(248,113,113,.6)'));
  charts.macd = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type: 'bar',  label: 'Histogram', data: hist, backgroundColor: histColors, borderWidth: 0, order: 2 },
        { type: 'line', label: 'MACD',      data: indicators.macd,        borderColor: '#60a5fa', borderWidth: 1.8, pointRadius: 0, fill: false, tension: 0.2, order: 1 },
        { type: 'line', label: 'Signal',    data: indicators.macd_signal, borderColor: '#fbbf24', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.2, order: 1 },
      ],
    },
    options: COMMON_OPTS,
  });
}

function renderHeader(data) {
  const last = data.candles[data.candles.length - 1];
  const prev = data.candles.length > 1 ? data.candles[data.candles.length - 2] : null;
  document.getElementById('page-title').textContent = `${data.ticker} · ${data.name || data.ticker}`;
  const lastDate = data.dates[data.dates.length - 1] || '';
  document.getElementById('page-sub').textContent =
    `最後資料日 ${lastDate}` + (data.currency ? ` · ${data.currency}` : '');

  const priceBlock = document.getElementById('price-block');
  priceBlock.innerHTML = '';
  if (last && last.close != null) {
    const change = prev && prev.close != null ? last.close - prev.close : null;
    const changePct = (change != null && prev.close) ? (change / prev.close * 100) : null;
    const up = change != null ? change >= 0 : null;
    const cls = up == null ? '' : (up ? 'up' : 'down');
    const arrow = up ? '▲' : '▼';
    priceBlock.insertAdjacentHTML('beforeend',
      `<div class="price ${cls}">${last.close.toLocaleString(undefined, { maximumFractionDigits: 4 })}</div>`);
    if (change != null) {
      priceBlock.insertAdjacentHTML('beforeend',
        `<span class="badge ${up ? 'badge-up' : 'badge-down'}">${arrow} ${Math.abs(change).toFixed(2)} (${changePct.toFixed(2)}%)</span>`);
    }
  }
}

function isTwTicker(t) {
  return /\.TWO?$/i.test(t);
}

async function loadBrokers() {
  const card = document.getElementById('broker-card');
  if (!isTwTicker(TICKER)) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  const body = document.getElementById('broker-body');
  body.innerHTML = '<div class="broker-empty">載入中…</div>';
  try {
    const r = await apiFetch(`/api/stocks/${encodeURIComponent(TICKER)}/brokers?days=20&top=5`);
    if (!r.ok) {
      body.innerHTML = `<div class="broker-empty">無法載入券商資料 (${r.status})</div>`;
      return;
    }
    const data = await r.json();
    const hint = document.getElementById('broker-hint');
    hint.textContent = data.as_of ? `近 ${data.days} 個交易日 · 截至 ${data.as_of}` : `近 ${data.days} 個交易日`;
    if (!data.top_brokers || !data.top_brokers.length) {
      body.innerHTML = '<div class="broker-empty">尚無券商資料（資料來源：FinMind，當日資料盤後更新）。</div>';
      return;
    }
    const fmtNum = n => (n == null) ? '—' : Math.round(n).toLocaleString();
    const fmtPrice = n => (n == null) ? '—' : n.toLocaleString(undefined, { maximumFractionDigits: 2, minimumFractionDigits: 2 });
    const rows = data.top_brokers.map((b, i) => `
      <tr>
        <td class="broker-name">${i + 1}. ${b.name || b.id}</td>
        <td class="up">${fmtNum(b.net_buy_volume)}</td>
        <td>${fmtNum(b.buy_volume)}</td>
        <td>${fmtNum(b.sell_volume)}</td>
        <td>${fmtPrice(b.avg_buy_price)}</td>
        <td><span class="streak">${b.consecutive_buy_days} 天</span></td>
      </tr>
    `).join('');
    body.innerHTML = `
      <table class="broker-table">
        <thead>
          <tr>
            <th class="broker-name">券商</th>

async function loadChip() {
  const card = document.getElementById('chip-card');
  if (!card) return;
  // 限 .TW / .TWO ticker
  if (!isTwTicker(TICKER)) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  const instBody = document.getElementById('chip-inst-body');
  const marginBody = document.getElementById('chip-margin-body');
  instBody.innerHTML = '<div class="chip-empty">載入中…</div>';
  marginBody.innerHTML = '<div class="chip-empty">載入中…</div>';

  try {
    const r = await apiFetch(`/api/stocks/${encodeURIComponent(TICKER)}/chip?days=20`);
    if (!r.ok) {
      instBody.innerHTML = `<div class="chip-empty">無法載入(${r.status})</div>`;
      marginBody.innerHTML = '';
      return;
    }
    const data = await r.json();
    if (!data.rows || !data.rows.length) {
      instBody.innerHTML = '<div class="chip-empty">尚無資料(資料來源:FinMind,盤後更新)。</div>';
      marginBody.innerHTML = '';
      return;
    }
    const hint = document.getElementById('chip-hint');
    if (hint && data.as_of) hint.textContent = `近 20 個交易日 (至 ${data.as_of})`;
    const fmtNet = v => {
      if (v === null || v === undefined) return '—';
      const cls = v > 0 ? 'chip-pos' : (v < 0 ? 'chip-neg' : '');
      const s = (v >= 0 ? '+' : '') + Math.round(v).toLocaleString();
      return `<span class="${cls}">${s}</span>`;
    };
    const fmtBal = v => v === null || v === undefined ? '—' : Math.round(v).toLocaleString();

    // 倒序顯示(最近的在最上面)
    const rev = [...data.rows].reverse();
    instBody.innerHTML = `
      <table class="chip-table">
        <thead><tr><th class="chip-date">日期</th><th>外資</th><th>投信</th><th>自營</th></tr></thead>
        <tbody>

            <tr>
              <td class="chip-date">${r.date.slice(5)}</td>
              <td>${fmtNet(r.foreign_net)}</td>
              <td>${fmtNet(r.trust_net)}</td>
              <td>${fmtNet(r.dealer_net)}</td>

        </tbody>
      </table>`;
    marginBody.innerHTML = `
      <table class="chip-table">
        <thead><tr><th class="chip-date">日期</th><th>融資餘額</th><th>融券餘額</th></tr></thead>
        <tbody>
          ${rev.map(r => `
            <tr>
              <td class="chip-date">${r.date.slice(5)}</td>

          `).join('')}
        </tbody>

          { type: 'bar',  label: '投資 CF', data: icf,  backgroundColor: '#f87171', stack: 'cf' },
          { type: 'bar',  label: '融資 CF', data: fcf,  backgroundColor: '#a78bfa', stack: 'cf' },
          { type: 'line', label: '自由 CF', data: free, borderColor: '#fbbf24', borderWidth: 1.5, pointRadius: 2 },
        ],
      },
      options: {
        ...COMMON_OPTS,
        scales: {
          x: { ...COMMON_OPTS.scales.x, ticks: { ...COMMON_OPTS.scales.x.ticks, maxTicksLimit: 6 }, stacked: true },
          y: { ...COMMON_OPTS.scales.y, title: { display: true, text: '億元', color: '#94a3b8' }, stacked: true },
        },
      },
    });
  } catch (e) {
    summary.innerHTML = `<div class="fund-empty">載入失敗:${e.message}</div>`;
  }
}

async function loadDividend() {
  const card = document.getElementById('dividend-card');
  if (!card) return;
  if (!isTwTicker(TICKER)) { card.style.display = 'none'; return; }
  card.style.display = '';
  const summary = document.getElementById('dividend-summary');
  const tableWrap = document.getElementById('dividend-table-wrap');
  summary.innerHTML = '<div class="fund-empty">載入中…</div>';
  tableWrap.innerHTML = '';

  try {
    const r = await apiFetch(`/api/stocks/${encodeURIComponent(TICKER)}/dividend?years=10`);
    if (!r.ok) {
      summary.innerHTML = `<div class="fund-empty">無法載入股利 (${r.status})</div>`;
      return;
    }
    const data = await r.json();
    if (!data.rows || !data.rows.length) {
      summary.innerHTML = '<div class="fund-empty">尚無股利資料</div>';
      return;
    }

    const fmtN = (v, d=2) => v === null || v === undefined ? '—' : Number(v).toFixed(d);

    const sm = data.summary || {};
    summary.innerHTML = `
      <div class="fund-stat">
        <span class="label">平均配發率</span>
        <span class="value">${fmtN(sm.avg_payout_ratio_pct)}%</span>
        <span class="sub">近 10 年現金股利 / EPS 平均</span>
      </div>
      <div class="fund-stat">
        <span class="label">平均殖利率</span>
        <span class="value">${sm.avg_dividend_yield_pct === null ? '—' : fmtN(sm.avg_dividend_yield_pct) + '%'}</span>
        <span class="sub">${sm.avg_dividend_yield_pct === null ? '需歷史均價,目前未計' : '近 10 年平均'}</span>
      </div>
    `;

    const rev = [...data.rows].reverse();
    tableWrap.innerHTML = `
      <table class="fund-table">
        <thead><tr>
          <th class="fund-label">年份</th>
          <th>現金股利</th><th>股票股利</th>
          <th>配發率</th><th>殖利率</th><th>除權息日</th>
        </tr></thead>
        <tbody>
          ${rev.map(r => `
            <tr>
              <td class="fund-label">${r.year}</td>
              <td>${fmtN(r.cash_dividend)}</td>
              <td>${fmtN(r.stock_dividend)}</td>
              <td>${fmtN(r.payout_ratio_pct)}${r.payout_ratio_pct !== null ? '%' : ''}</td>
              <td>${r.dividend_yield_pct === null ? '—' : fmtN(r.dividend_yield_pct) + '%'}</td>
              <td>${r.cash_ex_date ?? '—'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;

    const labels = data.rows.map(r => String(r.year));
    const cash = data.rows.map(r => r.cash_dividend);
    const stk  = data.rows.map(r => r.stock_dividend);
    const ctx = document.getElementById('chart-dividend').getContext('2d');
    if (dividendChart) dividendChart.destroy();
    dividendChart = new Chart(ctx, {
      type: 'bar',
      data: { labels, datasets: [
        { label: '現金股利', data: cash, backgroundColor: '#4ade80', stack: 'd' },
        { label: '股票股利', data: stk,  backgroundColor: '#a78bfa', stack: 'd' },
      ]},
      options: {
        ...COMMON_OPTS,
        scales: {
          x: { ...COMMON_OPTS.scales.x, stacked: true },
          y: { ...COMMON_OPTS.scales.y, title: { display: true, text: '元 / 股', color: '#94a3b8' }, stacked: true },
        },
      },
    });
  } catch (e) {
    summary.innerHTML = `<div class="fund-empty">載入失敗:${e.message}</div>`;
  }
}

async function loadDetail() {
  if (!TICKER) return;
  document.getElementById('status').textContent = '載入中…';
  document.getElementById('status').style.display = '';
  document.getElementById('charts').style.display = 'none';
  try {
    const r = await apiFetch(`/api/stocks/${encodeURIComponent(TICKER)}/history?time_range=${currentRange}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      document.getElementById('status').textContent = '無法載入資料：' + (err.detail || r.status);
      return;
    }
    const data = await r.json();
    if (!data.dates.length) {
      document.getElementById('status').textContent = '此區間無歷史資料。';
      return;
    }
    document.getElementById('status').style.display = 'none';
    document.getElementById('charts').style.display = '';
    renderHeader(data);
    destroyCharts();
    makeCandlestickChart(data.dates, data.candles);
    makePriceChart(data.dates, data.candles, data.indicators);
    makeVolumeChart(data.dates, data.candles);
    makeRsiChart(data.dates, data.indicators);
    makeMacdChart(data.dates, data.indicators);
    loadChip();
    loadValuation();
    loadRevenue();
    loadIncome();
    loadBalance();
    loadCashflow();
    loadDividend();
  } catch (e) {
    document.getElementById('status').textContent = '載入失敗：' + e.message;
  }
}

document.querySelectorAll('.range-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRange = btn.dataset.range;
    loadDetail();
  });
});

loadDetail();
</script>
</body>
</html>
