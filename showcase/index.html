<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>paul's tools — showcase gallery</title>
<style>
  :root {
    --bg: #f5f1ea;
    --ink: #1f1d18;
    --muted: #6c6760;
    --accent: #d97757;
    --card: #ffffff;
    --border: #d9d2c5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(900px 500px at 12% 0%, #fbe7d4 0%, transparent 60%),
      radial-gradient(700px 500px at 100% 100%, #d8e2cf 0%, transparent 55%),
      var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, system-ui, -apple-system, "Helvetica Neue",
                 "PingFang TC", "Noto Sans TC", sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 60px 32px 80px; }
  header { margin-bottom: 48px; }
  .eyebrow {
    font-family: ui-monospace, Menlo, monospace;
    font-size: 12px; letter-spacing: 1.5px;
    color: var(--accent); text-transform: uppercase; margin-bottom: 10px;
  }
  h1 { margin: 0 0 8px; font-size: 38px; letter-spacing: -0.5px; font-weight: 800; }
  .sub { color: var(--muted); font-size: 16px; max-width: 640px; line-height: 1.6; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px 18px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(80, 60, 40, 0.10);
    border-color: var(--accent);
  }
  .card .letter {
    position: absolute; top: 14px; right: 18px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px; color: var(--muted);
    letter-spacing: 1.5px;
  }
  .card .thumb {
    height: 110px;
    border-radius: 10px;
    margin-bottom: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px;
    overflow: hidden;
    position: relative;
  }
  .card h2 { margin: 0 0 4px; font-size: 18px; }
  .card p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
  .card .open {
    margin-top: auto; padding-top: 14px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px; color: var(--accent); letter-spacing: 0.5px;
  }

  /* Per-card thumb styles */
  .thumb.a { background: linear-gradient(135deg, #c4d4e6 0%, #8298b3 100%); color: #fff; }
  .thumb.b { background: #0b1220; color: #fff; }
  .thumb.c { background: #0a0a0a; color: #33ff33; font-family: ui-monospace, Menlo, monospace; font-size: 18px; }
  .thumb.d { background: #fdf6e3; color: #2d2a25; }
  .thumb.e { background: linear-gradient(135deg, #6e5cff 0%, #c2a3ff 100%); color: #fff; }
  .thumb.f { background: linear-gradient(180deg, #87ceeb 0%, #6fcc6f 100%); color: #fff; image-rendering: pixelated; font-size: 30px; }
  .thumb.g { background: linear-gradient(180deg, #eef3df 0%, #d0e0a0 100%); color: #4a5d2a; }

  footer { margin-top: 60px; color: var(--muted); font-size: 12.5px; line-height: 1.7; }
  footer code { background: #ece5d7; padding: 2px 5px; border-radius: 3px; font-size: 12px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="eyebrow">SHOWCASE · MOCKUP GALLERY</div>
    <h1>paul's tools — 七種展示方式</h1>
    <p class="sub">
      同一份工具清單，七種不同的呈現方式。挑你喜歡的視覺方向，
      正式版會用 React/Vite 重做並接上真實 metadata。
    </p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    本地預覽：<code>open showcase/index.html</code> 或 <code>cd showcase &amp;&amp; python3 -m http.server 8000</code>。<br/>
    所有 mockup 共用 <code>tools.js</code>，只需改一個檔案就能同步所有版本的資料。
  </footer>
</div>

<script src="tools.js"></script>
<script>
  const THUMBS = {
    a: '🖥',
    b: '🚇',
    c: '$ _',
    d: '✏️',
    e: '🃏',
    f: '🏰',
    g: '🌿',
  };
  const grid = document.getElementById('grid');
  (window.MOCKUPS || []).forEach(m => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = m.file;
    a.innerHTML = `
      <div class="letter">${m.id.toUpperCase()}</div>
      <div class="thumb ${m.id}">${THUMBS[m.id] || '·'}</div>
      <h2>${m.name.replace(/^[A-G] · /, '')}</h2>
      <p>${m.blurb}</p>
      <div class="open">open mockup →</div>
    `;
    grid.appendChild(a);
  });
</script>
</body>
</html>
