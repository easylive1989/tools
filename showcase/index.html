<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>paul's tools — 路線圖 (mockup)</title>
<style>
  :root {
    --bg: #0b0f17;
    --bg-soft: #0f1421;
    --panel: #111827;
    --border: #1f2937;
    --text: #e5e7eb;
    --muted: #94a3b8;
    --orange: #fb923c;
    --blue: #60a5fa;
    --purple: #c084fc;
    --green: #34d399;
    --gray: #94a3b8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(96,165,250,0.10), transparent 60%),
      radial-gradient(900px 500px at 110% 110%, rgba(192,132,252,0.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC",
                 "Noto Sans TC", system-ui, sans-serif;
    overflow: hidden;
  }
  header {
    padding: 18px 28px 10px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 0.4px;
    font-weight: 700;
  }
  header .subtitle { color: var(--muted); font-size: 13px; }
  header .pill {
    margin-left: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  .map-wrap {
    width: 100vw;
    height: calc(100vh - 72px);
    position: relative;
  }
  svg.map { width: 100%; height: 100%; display: block; }

  /* Lines */
  .line {
    fill: none;
    stroke-width: 12;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.95;
  }
  .infra {
    fill: none;
    stroke: var(--gray);
    stroke-width: 2.5;
    stroke-dasharray: 2 7;
    stroke-linecap: round;
    opacity: 0.55;
  }
  .line-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    fill: currentColor;
    opacity: 0.9;
  }

  /* Stations */
  .station { cursor: pointer; }
  .station .hit { fill: transparent; }
  .station circle.dot {
    fill: var(--bg);
    stroke-width: 4;
    transition: transform 0.15s ease, filter 0.15s ease;
    transform-box: fill-box;
    transform-origin: center;
  }
  .station:hover circle.dot { transform: scale(1.15); filter: drop-shadow(0 0 6px currentColor); }
  .station text {
    fill: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    pointer-events: none;
  }
  .station text.sub {
    fill: var(--muted);
    font-size: 10.5px;
    font-weight: 500;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  /* Transfer (interchange) station marker */
  .transfer circle.ring-outer { fill: var(--bg); stroke: var(--text); stroke-width: 3.5; }
  .transfer circle.ring-inner { fill: var(--text); }
  .transfer:hover circle.ring-outer { stroke: #fff; }

  /* Infra hub stations */
  .hub rect.body {
    fill: var(--bg);
    stroke: var(--gray);
    stroke-width: 2.5;
    stroke-dasharray: 4 4;
    rx: 8; ry: 8;
  }
  .hub text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11.5px; }
  .hub:hover rect.body { stroke: #fff; stroke-dasharray: 0; }

  /* Legend */
  .legend {
    position: absolute;
    right: 24px;
    top: 24px;
    background: rgba(17, 24, 39, 0.85);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(8px);
    font-size: 13px;
    min-width: 210px;
  }
  .legend h3 {
    margin: 0 0 10px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    font-weight: 700;
  }
  .legend-row { display: flex; align-items: center; gap: 10px; margin: 7px 0; }
  .legend-swatch { width: 26px; height: 4px; border-radius: 2px; flex: none; }
  .legend-swatch.dashed {
    height: 0;
    border-top: 2px dashed var(--gray);
    background: transparent;
  }
  .legend-mini {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 11.5px;
    line-height: 1.55;
  }

  /* Drawer */
  .drawer {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 400px;
    max-width: 92vw;
    background: linear-gradient(180deg, #111827 0%, #0d1320 100%);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.28s cubic-bezier(.2,.7,.2,1);
    padding: 28px 26px 24px;
    overflow-y: auto;
    box-shadow: -16px 0 40px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer .close-x {
    position: absolute;
    top: 14px; right: 16px;
    background: none; border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }
  .drawer .close-x:hover { color: var(--text); }
  .drawer h2 { margin: 0 0 6px; font-size: 22px; }
  .drawer .path {
    color: var(--muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .drawer .lines-served {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 18px;
  }
  .line-chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 10px;
    color: #0b0f17;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .drawer p { line-height: 1.65; font-size: 14px; color: #d6dbe5; margin: 0 0 14px; }
  .drawer .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 18px; }
  .tag {
    background: #1f2937;
    color: #e5e7eb;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-family: ui-monospace, Menlo, monospace;
  }
  .drawer .meta {
    margin-top: 14px;
    border-top: 1px solid var(--border);
    padding-top: 14px;
    font-size: 12px;
    color: var(--muted);
  }
  .drawer .meta strong { color: var(--text); }

  /* Hint when nothing selected */
  .hint {
    position: absolute;
    left: 24px; bottom: 22px;
    color: var(--muted);
    font-size: 12px;
    background: rgba(17,24,39,0.7);
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
  }
  .hint kbd {
    background: #1f2937; color: #e5e7eb;
    padding: 1px 6px; border-radius: 4px;
    font-family: ui-monospace, Menlo, monospace; font-size: 11px;
  }
</style>
</head>

      usedBy: ['ledger_analysis', 'personal_retro', 'medium', 'rss'],
    },
    'common/notify': {
      line: 'infra',
      path: 'common/notify.py',
      desc: 'send_notification (macOS terminal-notifier) + send_to_discord webhook。',
      tags: ['shared util', 'discord', 'macos'],
      usedBy: ['personal_retro', 'rss_hub'],
    },
  };

  const drawer = document.getElementById('drawer');
  const elName = document.getElementById('d-name');
  const elPath = document.getElementById('d-path');
  const elLines = document.getElementById('d-lines');
  const elDesc = document.getElementById('d-desc');
  const elTags = document.getElementById('d-tags');
  const elMeta = document.getElementById('d-meta');

  function chip(text, bg) {
    const span = document.createElement('span');
    span.className = 'line-chip';
    span.style.background = bg;
    span.textContent = text;
    return span;
  }

  function openStation(id) {
    const s = STATIONS[id];
    if (!s) return;
    elName.textContent = id;
    elPath.textContent = s.path;

    elLines.innerHTML = '';
    const lm = LINE_META[s.line];
    elLines.appendChild(chip(lm.name, lm.color));
    (s.transfers || []).forEach(t => {
      elLines.appendChild(chip('轉乘 → ' + t, '#cbd5e1'));
    });

    elDesc.textContent = s.desc;

    elTags.innerHTML = '';
    (s.tags || []).forEach(t => {
      const span = document.createElement('span');
      span.className = 'tag';
      span.textContent = t;
      elTags.appendChild(span);
    });

    elMeta.innerHTML = '';
    if (s.uses && s.uses.length) {
      elMeta.innerHTML += `<div><strong>使用：</strong> ${s.uses.join(' · ')}</div>`;
    }
    if (s.usedBy && s.usedBy.length) {
      elMeta.innerHTML += `<div><strong>被誰用：</strong> ${s.usedBy.join(' · ')}</div>`;
    }
    elMeta.innerHTML += `<div style="margin-top:6px;"><strong>GitHub：</strong> easylive1989/tools/${s.path}</div>`;

    drawer.classList.add('open');
  }
  function closeDrawer() { drawer.classList.remove('open'); }

  document.querySelectorAll('.station').forEach(el => {
    el.addEventListener('click', () => openStation(el.dataset.id));
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDrawer();
  });
</script>
</body>
</html>
